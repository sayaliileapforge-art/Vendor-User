services:
  - type: web
    name: enterprise-saas-app
    runtime: node
    rootDir: .
    buildCommand: NODE_OPTIONS=--max-old-space-size=400 npm ci --include=dev && npm --prefix backend ci --include=dev && npm run build:all
    startCommand: node --max-old-space-size=450 backend/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
